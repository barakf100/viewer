<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Viewer</title>
  <style>
:root {
  --bg-primary: #fafafa;
  --bg-secondary: #f0f0f0;
  --bg-tertiary: #e4e4e7;
  --bg-hover: rgba(0,0,0,0.04);
  --text-primary: #18181b;
  --text-secondary: #52525b;
  --text-muted: #a1a1aa;
  --border: rgba(0,0,0,0.08);
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --error-bg: #fef2f2;
  --error-text: #ef4444;
  --error-border: #fecaca;
  --syntax-string: #059669;
  --syntax-number: #d97706;
  --syntax-boolean: #7c3aed;
  --syntax-null: #a1a1aa;
  --syntax-key: #0ea5e9;
  --highlight-bg: #fde68a;
  --indent-guide: rgba(0,0,0,0.06);
  --selected-bg: rgba(59,130,246,0.08);
  --shadow: 0 1px 2px rgba(0,0,0,0.04);
}

[data-theme="dark"] {
  --bg-primary: #0c0c0c;
  --bg-secondary: #141414;
  --bg-tertiary: #1e1e1e;
  --bg-hover: rgba(255,255,255,0.04);
  --text-primary: #e4e4e7;
  --text-secondary: #a1a1aa;
  --text-muted: #52525b;
  --border: rgba(255,255,255,0.06);
  --accent: #60a5fa;
  --accent-hover: #93c5fd;
  --error-bg: rgba(239,68,68,0.1);
  --error-text: #f87171;
  --error-border: rgba(239,68,68,0.2);
  --syntax-string: #34d399;
  --syntax-number: #fbbf24;
  --syntax-boolean: #a78bfa;
  --syntax-null: #52525b;
  --syntax-key: #38bdf8;
  --highlight-bg: rgba(251,191,36,0.2);
  --indent-guide: rgba(255,255,255,0.06);
  --selected-bg: rgba(96,165,250,0.1);
  --shadow: 0 1px 2px rgba(0,0,0,0.2);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  transition: background 0.15s ease, color 0.15s ease;
  height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

.header {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.header-title {
  font-size: 13px; font-weight: 500; white-space: nowrap;
  letter-spacing: 0.02em; text-transform: uppercase; color: var(--text-muted);
}
.header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

.search-box {
  display: flex; align-items: center;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: 8px; padding: 5px 10px; gap: 6px;
  transition: border-color 0.15s ease;
}
.search-box:focus-within { border-color: var(--accent); }
.search-box input {
  border: none; outline: none; background: transparent;
  color: var(--text-primary); font-size: 13px; width: 200px;
  font-family: inherit;
}
.search-box input::placeholder { color: var(--text-muted); }
#searchCount { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
#searchClear {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1;
  border-radius: 4px; transition: color 0.15s ease;
}
#searchClear:hover { color: var(--text-primary); }

.icon-btn {
  background: transparent; border: 1px solid var(--border); border-radius: 8px;
  padding: 5px 10px; cursor: pointer; color: var(--text-secondary); font-size: 13px;
  transition: all 0.15s ease;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.primary-btn {
  background: var(--accent); color: white; border: none; border-radius: 8px;
  padding: 8px 20px; font-size: 13px; cursor: pointer; font-weight: 500;
  font-family: inherit; transition: background 0.15s ease;
}
.primary-btn:hover { background: var(--accent-hover); }
.primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.tool-btn {
  background: transparent; border: 1px solid var(--border); border-radius: 6px;
  padding: 3px 10px; cursor: pointer; color: var(--text-secondary); font-size: 12px;
  font-family: inherit; transition: all 0.15s ease;
}
.tool-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--text-muted); }

.error-banner {
  background: var(--error-bg); color: var(--error-text);
  border: 1px solid var(--error-border); border-radius: 8px;
  padding: 10px 16px; font-size: 12px;
  font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
  width: 100%; max-width: 800px;
}

.tab-bar {
  display: flex; align-items: center; padding: 0 20px;
  background: var(--bg-secondary); border-bottom: 1px solid var(--border); gap: 2px;
}
.tab {
  padding: 10px 14px; background: none; border: none;
  border-bottom: 2px solid transparent; cursor: pointer;
  color: var(--text-muted); font-size: 12px; font-weight: 500;
  font-family: inherit; letter-spacing: 0.01em;
  transition: color 0.15s ease;
}
.tab.active { color: var(--text-primary); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text-primary); }

.toolbar {
  display: flex; align-items: center; padding: 6px 20px; gap: 6px;
  background: var(--bg-primary); border-bottom: 1px solid var(--border);
}
.depth-control {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-muted); margin-left: 8px;
}
.depth-control input[type="range"] {
  width: 80px; accent-color: var(--accent);
}
.node-count { font-size: 11px; color: var(--text-muted); margin-left: auto; }

.main-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.panel { flex: 1; overflow: auto; }
.tree-container {
  padding: 16px 20px;
  font-family: 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 13px; line-height: 1.7;
}

.raw-controls { display: inline-flex; gap: 4px; margin-left: 8px; }
.raw-content {
  padding: 20px; font-family: 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 13px; line-height: 1.6; overflow: auto; flex: 1;
  white-space: pre-wrap; word-break: break-word;
}

.path-bar {
  display: flex; align-items: center; padding: 8px 20px;
  background: var(--bg-secondary); border-top: 1px solid var(--border);
  gap: 8px; font-size: 12px;
}
.path-type {
  background: var(--bg-tertiary); padding: 2px 8px; border-radius: 4px;
  font-size: 10px; color: var(--text-muted); text-transform: uppercase;
  font-weight: 600; letter-spacing: 0.04em;
}
.path-text {
  font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
  color: var(--text-secondary); flex: 1; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; font-size: 12px;
}

.text-content {
  width: 100%; flex: 1; padding: 20px; border: none; outline: none; resize: none;
  font-family: 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 13px;
  line-height: 1.6; background: var(--bg-primary); color: var(--text-primary);
  tab-size: 2;
}
.text-content::placeholder { color: var(--text-muted); }

.tree-node { position: relative; }
.tree-node-content {
  display: flex; align-items: baseline; gap: 4px;
  padding: 2px 4px; cursor: pointer; border-radius: 4px;
  transition: background 0.1s ease;
}
.tree-node-content:hover { background: var(--bg-hover); }
.tree-node-content.selected { background: var(--selected-bg); }
.tree-toggle {
  display: inline-block; width: 16px; text-align: center;
  color: var(--text-muted); cursor: pointer; user-select: none; flex-shrink: 0;
  font-size: 11px;
}
.tree-key { color: var(--syntax-key); }
.tree-string { color: var(--syntax-string); }
.tree-number { color: var(--syntax-number); }
.tree-boolean { color: var(--syntax-boolean); }
.tree-null { color: var(--syntax-null); font-style: italic; }
.tree-bracket { color: var(--text-muted); }
.tree-count { color: var(--text-muted); font-size: 11px; margin-left: 4px; opacity: 0.7; }
.tree-children {
  padding-left: 20px; border-left: 1px solid var(--indent-guide); margin-left: 7px;
}
.tree-children.collapsed { display: none; }
.search-highlight {
  background: var(--highlight-bg); border-radius: 2px; padding: 0 2px;
}
.tree-node.search-hidden { display: none; }

@media (max-width: 600px) {
  .header { padding: 8px 12px; }
  .search-box input { width: 120px; }
  .toolbar { flex-wrap: wrap; }
}
  </style>
</head>
<body>
  <header class="header">
    <h1 class="header-title">JSON Viewer</h1>
    <div class="header-actions">
      <div class="search-box" id="searchBox" style="display:none;">
        <input type="text" id="searchInput" placeholder="Search keys or values...">
        <span id="searchCount"></span>
        <button id="searchClear" title="Clear search">&times;</button>
      </div>
      <button id="themeToggle" class="icon-btn" title="Toggle theme">🌙</button>
    </div>
  </header>

  <div id="mainView" class="main-view">
    <div class="tab-bar">
      <button class="tab" data-tab="tree">Tree</button>
      <button class="tab" data-tab="raw">Raw</button>
      <button class="tab active" data-tab="text">Text</button>
      <span id="rawControls" class="raw-controls" style="display:none;">
        <button id="rawFormatBtn" class="tool-btn">Format</button>
        <button id="rawMinifyBtn" class="tool-btn">Minify</button>
      </span>
    </div>

    <div class="toolbar" id="toolbar" style="display:none;">
      <button id="expandAllBtn" class="tool-btn">Expand All</button>
      <button id="collapseAllBtn" class="tool-btn">Collapse All</button>
      <label class="depth-control">
        Depth: <input type="range" id="depthSlider" min="1" max="10" value="3">
        <span id="depthValue">3</span>
      </label>
      <span id="nodeCount" class="node-count"></span>
    </div>

    <div id="treePanel" class="panel" style="display:none;">
      <div id="treeContainer" class="tree-container"></div>
    </div>

    <div id="rawPanel" class="panel" style="display:none;">
      <pre id="rawContent" class="raw-content"></pre>
    </div>

    <div id="textPanel" class="panel" style="display:flex;flex-direction:column;">
      <div id="textError" class="error-banner" style="display:none;font-size:12px;padding:6px 12px;margin:8px 16px;max-width:none;"></div>
      <textarea id="textContent" class="text-content" placeholder="Paste or type JSON here..."></textarea>
    </div>

    <div class="path-bar" id="pathBar" style="display:none;">
      <span id="pathType" class="path-type"></span>
      <code id="pathText" class="path-text"></code>
      <button id="pathCopy" class="icon-btn" title="Copy path">📋</button>
    </div>
  </div>


  <script>
const ThemeManager = {
  init() {
    const saved = localStorage.getItem('json-viewer-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    this.updateIcon();
  },
  toggle() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('json-viewer-theme', next);
    document.documentElement.setAttribute('data-theme', next);
    this.updateIcon();
  },
  updateIcon() {
    const btn = document.getElementById('themeToggle');
    const theme = document.documentElement.getAttribute('data-theme');
    btn.textContent = theme === 'dark' ? '🌙' : '☀️';
    btn.title = theme === 'dark' ? 'Theme: Dark' : 'Theme: Light';
  }
};

function parseJSON(text) {
  try {
    const data = JSON.parse(text);
    return { ok: true, data };
  } catch (e) {
    const match = e.message.match(/position\s+(\d+)/i);
    let line = null, col = null;
    if (match) {
      const pos = parseInt(match[1]);
      const before = text.substring(0, pos);
      line = (before.match(/\n/g) || []).length + 1;
      col = pos - before.lastIndexOf('\n');
    }
    return { ok: false, error: e.message, line, col };
  }
}

let totalNodeCount = 0;
let selectedNodeEl = null;

function buildPath(parentPath, key, isArrayItem) {
  if (parentPath === '$' && key === '') return '$';
  if (isArrayItem) return `${parentPath}[${key}]`;
  if (/^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(key)) return `${parentPath}.${key}`;
  return `${parentPath}["${key}"]`;
}

function getType(value) {
  if (value === null) return 'null';
  if (Array.isArray(value)) return 'array';
  return typeof value;
}

function truncateString(str, max) {
  if (str.length <= max) return str;
  return str.substring(0, max) + '…';
}

function renderTree(data) {
  totalNodeCount = 0;
  selectedNodeEl = null;
  const container = document.getElementById('treeContainer');
  container.innerHTML = '';
  const rootNode = createTreeNode('', data, '$', false, 0);
  container.appendChild(rootNode);
  document.getElementById('nodeCount').textContent = `${totalNodeCount} nodes`;
}

function createTreeNode(key, value, path, isArrayItem, depth) {
  totalNodeCount++;
  const type = getType(value);
  const node = document.createElement('div');
  node.className = 'tree-node';
  node.dataset.path = path;
  node.dataset.depth = depth;

  const content = document.createElement('div');
  content.className = 'tree-node-content';

  const defaultDepth = parseInt(document.getElementById('depthSlider').value);
  const isExpandable = type === 'object' || type === 'array';

  if (isExpandable) {
    const toggle = document.createElement('span');
    toggle.className = 'tree-toggle';
    toggle.textContent = depth < defaultDepth ? '▾' : '▸';
    content.appendChild(toggle);

    if (key !== '' || path !== '$') {
      const keySpan = document.createElement('span');
      keySpan.className = isArrayItem ? 'tree-number' : 'tree-key';
      keySpan.dataset.searchable = key;
      keySpan.textContent = isArrayItem ? key : `"${key}"`;
      content.appendChild(keySpan);

      const colon = document.createElement('span');
      colon.textContent = ': ';
      colon.style.color = 'var(--text-muted)';
      content.appendChild(colon);
    }

    const bracket = document.createElement('span');
    bracket.className = 'tree-bracket';
    bracket.textContent = type === 'array' ? '[' : '{';
    content.appendChild(bracket);

    const count = document.createElement('span');
    count.className = 'tree-count';
    const itemCount = type === 'array' ? value.length : Object.keys(value).length;
    count.textContent = `${itemCount}`;
    content.appendChild(count);

    const closeBracket = document.createElement('span');
    closeBracket.className = 'tree-bracket';
    closeBracket.textContent = type === 'array' ? ']' : '}';
    content.appendChild(closeBracket);

    node.appendChild(content);

    const children = document.createElement('div');
    children.className = 'tree-children';
    if (depth >= defaultDepth) children.classList.add('collapsed');

    const entries = type === 'array'
      ? value.map((v, i) => [String(i), v, true])
      : Object.entries(value).map(([k, v]) => [k, v, false]);

    entries.forEach(([k, v, isArr]) => {
      const childPath = buildPath(path, k, isArr);
      children.appendChild(createTreeNode(k, v, childPath, isArr, depth + 1));
    });

    node.appendChild(children);

    content.addEventListener('click', () => {
      const collapsed = children.classList.toggle('collapsed');
      toggle.textContent = collapsed ? '▸' : '▾';
      selectNode(content, path, type, value);
    });
  } else {
    const spacer = document.createElement('span');
    spacer.className = 'tree-toggle';
    spacer.textContent = ' ';
    content.appendChild(spacer);

    if (key !== '') {
      const keySpan = document.createElement('span');
      keySpan.className = isArrayItem ? 'tree-number' : 'tree-key';
      keySpan.dataset.searchable = key;
      keySpan.textContent = isArrayItem ? key : `"${key}"`;
      content.appendChild(keySpan);

      const colon = document.createElement('span');
      colon.textContent = ': ';
      colon.style.color = 'var(--text-muted)';
      content.appendChild(colon);
    }

    const valSpan = document.createElement('span');
    valSpan.dataset.searchable = String(value);
    if (type === 'string') {
      valSpan.className = 'tree-string';
      valSpan.textContent = `"${truncateString(value, 200)}"`;
    } else if (type === 'number') {
      valSpan.className = 'tree-number';
      valSpan.textContent = String(value);
    } else if (type === 'boolean') {
      valSpan.className = 'tree-boolean';
      valSpan.textContent = String(value);
    } else {
      valSpan.className = 'tree-null';
      valSpan.textContent = 'null';
    }
    content.appendChild(valSpan);

    node.appendChild(content);
    content.addEventListener('click', () => selectNode(content, path, type, value));
  }

  return node;
}

function selectNode(contentEl, path, type, value) {
  if (selectedNodeEl) selectedNodeEl.classList.remove('selected');
  contentEl.classList.add('selected');
  selectedNodeEl = contentEl;

  const pathBar = document.getElementById('pathBar');
  pathBar.style.display = 'flex';
  document.getElementById('pathType').textContent = type;

  let preview = '';
  if (type === 'string') preview = ` → "${truncateString(value, 60)}"`;
  else if (type === 'object') preview = ` → {${Object.keys(value).length} keys}`;
  else if (type === 'array') preview = ` → [${value.length} items]`;
  else if (value !== null) preview = ` → ${value}`;

  document.getElementById('pathText').textContent = path + preview;
}

function updateRawView(data, formatted) {
  const raw = document.getElementById('rawContent');
  const text = formatted ? JSON.stringify(data, null, 2) : JSON.stringify(data);
  raw.textContent = '';
  syntaxHighlightRaw(raw, text);
}

function syntaxHighlightRaw(container, text) {
  let lastIndex = 0;
  const fullRegex = /("(?:\\.|[^"\\])*")\s*:|("(?:\\.|[^"\\])*")|\b(true|false)\b|\b(null)\b|(-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)/g;
  let match;
  while ((match = fullRegex.exec(text)) !== null) {
    if (match.index > lastIndex) {
      container.appendChild(document.createTextNode(text.substring(lastIndex, match.index)));
    }
    const span = document.createElement('span');
    if (match[1]) {
      span.className = 'tree-key';
      span.textContent = match[1];
      container.appendChild(span);
      container.appendChild(document.createTextNode(':'));
      lastIndex = fullRegex.lastIndex;
      continue;
    } else if (match[2]) {
      span.className = 'tree-string';
      span.textContent = match[2];
    } else if (match[3]) {
      span.className = 'tree-boolean';
      span.textContent = match[3];
    } else if (match[4]) {
      span.className = 'tree-null';
      span.textContent = match[4];
    } else if (match[5]) {
      span.className = 'tree-number';
      span.textContent = match[5];
    }
    container.appendChild(span);
    lastIndex = fullRegex.lastIndex;
  }
  if (lastIndex < text.length) {
    container.appendChild(document.createTextNode(text.substring(lastIndex)));
  }
}

function expandAll() {
  document.querySelectorAll('.tree-children').forEach(el => {
    el.classList.remove('collapsed');
  });
  document.querySelectorAll('.tree-toggle').forEach(el => {
    if (el.textContent === '▸') el.textContent = '▾';
  });
}

function collapseAll() {
  document.querySelectorAll('.tree-children').forEach(el => {
    el.classList.add('collapsed');
  });
  document.querySelectorAll('.tree-toggle').forEach(el => {
    if (el.textContent === '▾') el.textContent = '▸';
  });
}

function collapseToDepth(maxDepth) {
  document.querySelectorAll('.tree-node').forEach(node => {
    const depth = parseInt(node.dataset.depth);
    const children = node.querySelector(':scope > .tree-children');
    const toggle = node.querySelector(':scope > .tree-node-content > .tree-toggle');
    if (children && toggle) {
      if (depth < maxDepth) {
        children.classList.remove('collapsed');
        toggle.textContent = '▾';
      } else {
        children.classList.add('collapsed');
        toggle.textContent = '▸';
      }
    }
  });
}

function searchTree(query) {
  const container = document.getElementById('treeContainer');
  const allNodes = container.querySelectorAll('.tree-node');

  container.querySelectorAll('.search-highlight').forEach(el => {
    el.replaceWith(document.createTextNode(el.textContent));
  });
  allNodes.forEach(n => n.classList.remove('search-hidden'));

  if (!query) {
    document.getElementById('searchCount').textContent = '';
    return;
  }

  const lowerQuery = query.toLowerCase();
  let matchCount = 0;
  const matchedNodes = new Set();

  allNodes.forEach(node => {
    const searchables = node.querySelectorAll(':scope > .tree-node-content [data-searchable]');
    let nodeMatches = false;

    searchables.forEach(el => {
      const text = el.dataset.searchable;
      if (text.toLowerCase().includes(lowerQuery)) {
        nodeMatches = true;
        highlightText(el, query);
      }
    });

    if (nodeMatches) {
      matchCount++;
      matchedNodes.add(node);
      let parent = node.parentElement;
      while (parent) {
        if (parent.classList && parent.classList.contains('tree-node')) {
          matchedNodes.add(parent);
        }
        parent = parent.parentElement;
      }
    }
  });

  allNodes.forEach(node => {
    if (!matchedNodes.has(node)) {
      node.classList.add('search-hidden');
    }
  });

  matchedNodes.forEach(node => {
    const children = node.querySelector(':scope > .tree-children');
    const toggle = node.querySelector(':scope > .tree-node-content > .tree-toggle');
    if (children && toggle) {
      children.classList.remove('collapsed');
      toggle.textContent = '▾';
    }
  });

  document.getElementById('searchCount').textContent = `${matchCount} match${matchCount !== 1 ? 'es' : ''}`;
}

function highlightText(el, query) {
  const text = el.textContent;
  const lowerText = text.toLowerCase();
  const lowerQuery = query.toLowerCase();
  const idx = lowerText.indexOf(lowerQuery);
  if (idx === -1) return;

  const before = document.createTextNode(text.substring(0, idx));
  const highlight = document.createElement('span');
  highlight.className = 'search-highlight';
  highlight.textContent = text.substring(idx, idx + query.length);
  const after = document.createTextNode(text.substring(idx + query.length));

  el.textContent = '';
  el.appendChild(before);
  el.appendChild(highlight);
  el.appendChild(after);
}

function showCopyFeedback(button) {
  const prev = button.textContent;
  button.textContent = '✓';
  setTimeout(() => { button.textContent = prev; }, 1500);
}

document.addEventListener('DOMContentLoaded', () => {
  ThemeManager.init();
  document.getElementById('themeToggle').addEventListener('click', () => ThemeManager.toggle());

  let currentJSON = null;
  let activeTab = 'text';

  document.getElementById('searchBox').style.display = 'flex';
  document.getElementById('textContent').focus();

  function applyTextChanges() {
    const text = document.getElementById('textContent').value;
    const textError = document.getElementById('textError');
    const result = parseJSON(text);
    if (!result.ok) {
      textError.style.display = 'block';
      let msg = result.error;
      if (result.line) msg += ` (line ${result.line}, column ${result.col})`;
      textError.textContent = msg;
      return false;
    }
    textError.style.display = 'none';
    currentJSON = result.data;
    return true;
  }

  function switchTab(target) {
    if (activeTab === 'text' && target !== 'text') {
      applyTextChanges();
    }
    if (target === 'tree') renderTree(currentJSON);
    if (target === 'raw') updateRawView(currentJSON, true);
    if (target === 'text') {
      if (currentJSON !== null) {
        document.getElementById('textContent').value = JSON.stringify(currentJSON, null, 2);
      }
      document.getElementById('textError').style.display = 'none';
    }
    document.getElementById('treePanel').style.display = target === 'tree' ? 'block' : 'none';
    document.getElementById('rawPanel').style.display = target === 'raw' ? 'flex' : 'none';
    document.getElementById('textPanel').style.display = target === 'text' ? 'flex' : 'none';
    document.getElementById('toolbar').style.display = target === 'tree' ? 'flex' : 'none';
    document.getElementById('rawControls').style.display = target === 'raw' ? 'inline-flex' : 'none';
    activeTab = target;
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      switchTab(tab.dataset.tab);
    });
  });


  document.getElementById('expandAllBtn').addEventListener('click', expandAll);
  document.getElementById('collapseAllBtn').addEventListener('click', collapseAll);

  const depthSlider = document.getElementById('depthSlider');
  const depthValue = document.getElementById('depthValue');
  depthSlider.addEventListener('input', () => {
    depthValue.textContent = depthSlider.value;
    collapseToDepth(parseInt(depthSlider.value));
  });

  document.getElementById('pathCopy').addEventListener('click', () => {
    const pathText = document.getElementById('pathText').textContent.split(' → ')[0];
    navigator.clipboard.writeText(pathText);
    showCopyFeedback(document.getElementById('pathCopy'));
  });

  document.getElementById('rawFormatBtn').addEventListener('click', () => {
    updateRawView(currentJSON, true);
  });
  document.getElementById('rawMinifyBtn').addEventListener('click', () => {
    updateRawView(currentJSON, false);
  });

  let searchTimeout;
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => searchTree(e.target.value.trim()), 150);
  });
  document.getElementById('searchClear').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    searchTree('');
  });

  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
      if (document.getElementById('mainView').style.display !== 'none') {
        e.preventDefault();
        document.getElementById('searchInput').focus();
      }
    }
    if (e.key === 'Escape') {
      if (document.activeElement === document.getElementById('searchInput')) {
        document.getElementById('searchInput').value = '';
        searchTree('');
        document.getElementById('searchInput').blur();
      }
    }
  });
});
  </script>
</body>
</html>
